# this is generated from nodes/deployer/config.yml, any changes will not be checked in
# you can edit nodes/deployer/config.yml and run `REMOVE_OLD_STATE=y ./tests/nodes/start.sh TESTCASE` to regenerate

fiber:
  chain: dev.toml
  auto_announce_node: true
  announce_private_addr: true
  watchtower_check_interval_seconds: 1
  gossip_store_maintenance_interval_ms: 1000
  gossip_network_maintenance_interval_ms: 1000
  listening_addr: /ip4/0.0.0.0/tcp/8345
  announced_addrs:
  - /ip4/127.0.0.1/tcp/8345
  announced_node_name: fiber-2
rpc:
  listening_addr: 127.0.0.1:21715
  enabled_modules:
  - channel
  - payment
  - graph
  - info
  - invoice
  - peer
  - pubsub
  - watchtower
  - dev
  - prof
ckb:
  tx_tracing_polling_interval_ms: 300
services:
- fiber
- rpc
- ckb
