## NOTE: this file is kept only as a reference copy of the node config shape.
## The demo starts from the checked-in configs under bootnode/, 1/, 2/, and 3/.

fiber:
  chain: dev.toml
  auto_announce_node: true
  announce_private_addr: true
  watchtower_check_interval_seconds: 1
  gossip_store_maintenance_interval_ms: 1000
  gossip_network_maintenance_interval_ms: 1000

rpc:
  listening_addr: 127.0.0.1:41716
  enabled_modules:
    - channel
    - payment
    - graph
    - info
    - invoice
    - peer
    - pubsub
    - watchtower
    - dev
    - prof

ckb:
  tx_tracing_polling_interval_ms: 300

services:
  - fiber
  - rpc
  - ckb
